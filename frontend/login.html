<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app_title">SAKRA FINANCE</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta name="theme-color" content="#050816">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="relative min-h-screen w-full overflow-hidden select-none">
  
  <!-- Ambient Environmental Elements -->
  <div class="sakra-financial-grid"></div>
  <div class="sakra-ambient-glow"></div>

  <div class="min-h-screen w-full flex items-center justify-center sa-reveal relative z-10 p-4 md:p-8">
    
    <!-- Interactive Particles Background Canvas -->
    <canvas id="particlesCanvas" class="absolute inset-0 w-full h-full z-0 pointer-events-none"></canvas>

    <div class="w-full max-w-lg relative z-10 sakra-3d-card-wrapper">
      
      <!-- Card Wrapper -->
      <div id="login-card" class="sakra-3d-card glass-card p-8 md:p-12 bg-slate-950/45 border border-white/5 rounded-xl shadow-deep backdrop-blur-md flex flex-col gap-6">
        
        <!-- Brand Identity / Logo -->
        <div class="flex flex-col items-center gap-3 select-none mb-4">
          <img src="/logo.png" alt="SAKRA FINANCE" class="h-16 w-auto object-contain" />
          <h1 class="text-xs font-bold uppercase tracking-[0.2em] text-blue-400 mt-2" data-i18n="login_title">Asset Desk Operations</h1>
        </div>

        <div id="error-message" class="mb-4 p-4 rounded-md text-xs font-semibold bg-rose-950/30 border border-rose-900/50 text-rose-300 leading-relaxed hidden">
          <!-- Dynamic error message -->
        </div>

        <form id="login-form" class="flex flex-col gap-5">
          
          <!-- Employee username input -->
          <div class="flex flex-col gap-1.5">
            <label for="username" class="text-[10px] font-bold uppercase tracking-wider text-slate-400 select-none" data-i18n="login_label_username">
              Employee username
            </label>
            <div class="relative">
              <div class="absolute top-1/2 -translate-y-1/2 left-3.5 flex items-center pointer-events-none text-slate-500">
                <i data-lucide="user" class="w-4 h-4"></i>
              </div>
              <input
                id="username"
                name="username"
                type="text"
                data-i18n-placeholder="login_label_username"
                placeholder="e.g. admin"
                class="sakra-input-tactile pl-10"
                required
              />
            </div>
          </div>

          <!-- Password field with Caps Lock check -->
          <div class="flex flex-col gap-1.5 relative">
            <div class="flex items-center justify-between">
              <label for="password" class="text-[10px] font-bold uppercase tracking-wider text-slate-400 select-none" data-i18n="login_label_password">
                Password
              </label>
              <div id="capslock-warning" class="hidden flex items-center gap-1 text-[9px] uppercase tracking-widest text-warning font-bold bg-amber-950/40 px-2 py-0.5 rounded border border-amber-900/50 mt-[-2px] animate-pulse">
                <i data-lucide="alert-circle" class="w-3 h-3 text-warning"></i>
                <span data-i18n="login_capslock">Caps Lock On</span>
              </div>
            </div>
            <div class="relative">
              <div class="absolute top-1/2 -translate-y-1/2 left-3.5 flex items-center pointer-events-none text-slate-500">
                <i data-lucide="key" class="w-4 h-4"></i>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="••••••••••••"
                class="sakra-input-tactile pl-10 pr-10"
                required
              />
              <button
                type="button"
                id="toggle-password"
                class="absolute top-1/2 -translate-y-1/2 right-3.5 flex items-center text-slate-500 hover:text-slate-300 cursor-pointer bg-transparent border-none"
              >
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- Security parameters note -->
          <div class="flex items-center justify-between text-[11px] text-slate-400 mt-4 select-none">
            <div class="flex items-center gap-1.5 font-semibold text-[9px] uppercase tracking-wider">
              <i data-lucide="shield-alert" class="w-3.5 h-3.5 text-blue-500"></i>
              <span data-i18n="login_role_enforced">Role Access Enforced</span>
            </div>
            <a href="/forgot.html" class="text-blue-400 hover:underline font-bold bg-transparent border-none outline-none cursor-pointer" data-i18n="login_forgot">
              Forgot credentials?
            </a>
          </div>

          <!-- Submit trigger button -->
          <button
            type="submit"
            id="submit-btn"
            class="sakra-btn-tactile sakra-btn-primary w-full h-12 mt-4 text-[11px] select-none"
          >
            <span data-i18n="login_btn_signin">Sign In To SAKRA</span>
          </button>

        </form>

      </div>

    </div>

  </div>

  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/pages/login.js"></script>
</body>
</html>
