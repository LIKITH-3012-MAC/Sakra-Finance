<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAKRA FINANCE | Loading</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta name="theme-color" content="#050816">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="global-page-loader" class="flex items-center justify-center" style="min-height: 100vh;">
    <div class="flex flex-col items-center gap-4">
      <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-600"></i>
      <p class="text-xs text-text-secondary font-mono tracking-wider font-semibold">SAKRA SECURITY CHECK IN PROGRESS...</p>
    </div>
  </div>

  <script type="module">
    import { checkSession } from "./assets/js/auth.js";
    import { applyTheme } from "./assets/js/theme.js";

    // Setup UI icons & theme
    applyTheme();
    if (window.lucide) {
      window.lucide.createIcons();
    }

    async function route() {
      const user = await checkSession();
      if (user) {
        window.location.href = "/dashboard.html";
      } else {
        window.location.href = "/login.html";
      }
    }
    route();
  </script>
</body>
</html>
