<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAKRA FINANCE | Loading</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#050816">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SAKRA FINANCE">
  <meta name="application-name" content="SAKRA FINANCE">
  <meta name="msapplication-TileColor" content="#050816">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="global-page-loader" class="flex items-center justify-center" style="min-height: 100vh;">
    <div class="flex flex-col items-center gap-4">
      <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-600"></i>
      <p class="text-xs text-text-secondary font-mono tracking-wider font-semibold">SAKRA SECURITY CHECK IN PROGRESS...</p>
    </div>
  </div>

  <script type="module">
    import { checkSession } from "./assets/js/auth.js";
    import { applyTheme } from "./assets/js/theme.js";
    import { registerServiceWorker } from "./assets/js/pwa.js";

    // Register PWA Service Worker
    registerServiceWorker();

    // Setup UI icons & theme
    applyTheme();
    if (window.lucide) {
      window.lucide.createIcons();
    }

    async function route() {
      const user = await checkSession();
      if (user) {
        window.location.href = "/dashboard.html";
      } else {
        window.location.href = "/login.html";
      }
    }
    route();
  </script>
</body>
</html>
