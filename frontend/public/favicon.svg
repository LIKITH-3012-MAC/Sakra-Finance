<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <!-- Background glow filter -->
    <filter id="bg-glow" x="50" y="50" width="412" height="412" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>
    
    <!-- Metallic gradient for the outer frame -->
    <linearGradient id="metal-border" x1="160" y1="80" x2="352" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="15%" stop-color="#e2e8f0" />
      <stop offset="35%" stop-color="#1d4ed8" />
      <stop offset="55%" stop-color="#ffffff" />
      <stop offset="75%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    
    <!-- Dark inner background gradient -->
    <linearGradient id="inner-dark" x1="256" y1="130" x2="256" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Central Orb gradient -->
    <radialGradient id="orb-radial" cx="256" cy="210" r="28" fx="246" fy="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#38bdf8" />
      <stop offset="70%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    
    <!-- Central Orb Glow filter -->
    <filter id="orb-glow" x="196" y="150" width="120" height="120" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8" result="blur" />
    </filter>
    
    <!-- Flare glow filter -->
    <filter id="flare-glow" x="206" y="30" width="100" height="100" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="5" result="blur" />
    </filter>
  </defs>
  
  <!-- 1. Ambient Background Glow Behind Shield -->
  <circle cx="256" cy="230" r="140" fill="#1d4ed8" opacity="0.18" filter="url(#bg-glow)" />
  <circle cx="256" cy="230" r="70" fill="#00f0ff" opacity="0.15" filter="url(#bg-glow)" />

  <!-- 2. Glowing outer outline of the Delta shield -->
  <path d="M 256 74 L 412 284 L 256 331 L 100 284 Z" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.65" />

  <!-- 3. Main Outer Bevel Frame -->
  <path d="M 256 80 L 406 280 L 256 325 L 106 280 Z M 256 130 L 146 260 L 256 295 L 366 260 Z" fill="url(#metal-border)" fill-rule="evenodd" />

  <!-- 4. Inner Dark Shield Cutout -->
  <path d="M 256 130 L 366 260 L 256 295 L 146 260 Z" fill="url(#inner-dark)" />

  <!-- 5. Blue Orb Back-Glow -->
  <circle cx="256" cy="210" r="35" fill="#00f0ff" opacity="0.45" filter="url(#orb-glow)" />

  <!-- 6. Central 3D Blue Sphere/Orb -->
  <circle cx="256" cy="210" r="28" fill="url(#orb-radial)" />

  <!-- 7. Lens flare starburst at the top vertex -->
  <g transform="translate(256, 80)">
    <circle cx="0" cy="0" r="12" fill="#00f0ff" opacity="0.6" filter="url(#flare-glow)" />
    <ellipse cx="0" cy="0" rx="2.5" ry="35" fill="#ffffff" opacity="0.9" />
    <ellipse cx="0" cy="0" rx="35" ry="2.5" fill="#ffffff" opacity="0.9" />
    <ellipse cx="0" cy="0" rx="1.5" ry="20" fill="#ffffff" opacity="0.75" transform="rotate(45)" />
    <ellipse cx="0" cy="0" rx="1.5" ry="20" fill="#ffffff" opacity="0.75" transform="rotate(-45)" />
  </g>
</svg>