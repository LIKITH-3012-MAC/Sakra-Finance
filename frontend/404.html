<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="error_404_title">SAKRA FINANCE | 404 Not Found</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta name="theme-color" content="#050816">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center p-6 select-none bg-[#050816]">
  
  <!-- Ambient Environmental Elements -->
  <div class="sakra-financial-grid"></div>
  <div class="sakra-ambient-glow"></div>

  <div class="glass-card max-w-md w-full p-8 text-center flex flex-col items-center gap-6 relative z-10">
    <img src="/logo.png" alt="SAKRA Logo" class="h-12 w-auto object-contain mb-2" />
    
    <div>
      <h1 class="text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400 font-mono tracking-tighter">404</h1>
      <h2 class="text-lg font-bold text-text-primary uppercase tracking-wider mt-2" data-i18n="error_404_title">Resource Not Found</h2>
      <p class="text-xs text-text-muted mt-2 leading-relaxed" data-i18n="error_404_desc">
        The requested secure workspace path or gateway node could not be resolved by SAKRA routers.
      </p>
    </div>

    <div class="w-full h-px bg-border-default/40 my-2"></div>

    <a href="/dashboard.html" class="sakra-btn-primary w-full flex items-center justify-center gap-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      <span data-i18n="error_btn_dashboard">Return to Dashboard</span>
    </a>
  </div>

  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
