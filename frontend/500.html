<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="error_500_title">SAKRA FINANCE | 500 Server Error</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#050816">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SAKRA FINANCE">
  <meta name="application-name" content="SAKRA FINANCE">
  <meta name="msapplication-TileColor" content="#050816">
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png">
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center p-6 select-none bg-[#050816]">
  <!-- PWA Splash Screen Overlay -->
  <div id="global-page-loader"></div>
  
  <!-- Ambient Environmental Elements -->
  <div class="sakra-financial-grid"></div>
  <div class="sakra-ambient-glow"></div>

  <div class="glass-card max-w-md w-full p-8 text-center flex flex-col items-center gap-6 relative z-10">
    <img src="/logo.png" alt="SAKRA Logo" class="h-12 w-auto object-contain mb-2" />
    
    <div>
      <h1 class="text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-400 font-mono tracking-tighter">500</h1>
      <h2 class="text-lg font-bold text-text-primary uppercase tracking-wider mt-2" data-i18n="error_500_title">Server Error</h2>
      <p class="text-xs text-text-muted mt-2 leading-relaxed" data-i18n="error_500_desc">
        An unexpected backend gateway exception occurred. SAKRA network engineers have been notified.
      </p>
    </div>

    <div class="w-full h-px bg-border-default/40 my-2"></div>

    <a href="/dashboard.html" class="sakra-btn-primary w-full flex items-center justify-center gap-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      <span data-i18n="error_btn_dashboard">Return to Dashboard</span>
    </a>
  </div>

  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
